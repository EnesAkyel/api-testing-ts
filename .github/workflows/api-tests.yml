name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '24'
  BASE_URL: http://localhost:8080/api/v1

jobs:
  setup:
    name: Build movie-catalog-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout movie-catalog-api
        uses: actions/checkout@v7
        with:
          repository: EnesAkyel/movie-catalog-api

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: ./mvnw package -DskipTests -q

      - name: Upload application JAR
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/movie-catalog-api-*.jar
          retention-days: 1

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm exec --ignore-scripts -- tsc --noEmit

  test:
    name: Smoke / Contract / Integration
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout api-testing-ts
        uses: actions/checkout@v7

      - name: Start movie-catalog-api
        uses: ./.github/actions/start-api

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Smoke tests
        run: npm run test:smoke

      - name: Contract tests
        run: npm run test:contract

      - name: Integration tests
        run: npm run test:integration

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: reports/
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@15bd94e2474955b290dfeb69de65934149021a8a
        with:
          name: Test Results
          path: reports/*-junit.xml
          reporter: jest-junit

  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Checkout api-testing-ts
        uses: actions/checkout@v7

      - name: Start movie-catalog-api
        uses: ./.github/actions/start-api

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Run regression tests
        run: npm run test:regression

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-report
          path: reports/
          retention-days: 14